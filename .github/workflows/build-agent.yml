name: Build Agent Image

on:
  push:
    branches: [main]
    paths:
      - 'container/**'
      - 'Dockerfile.agent'
      - 'Dockerfile.vevria'
      - 'src/**'
      - 'package.json'

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: vevria/nanoclaw-agent

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push agent image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: Dockerfile.agent
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.sha }}

      - name: Build and push Vevria server image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: Dockerfile.vevria
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:vevria-latest
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:vevria-${{ github.sha }}
